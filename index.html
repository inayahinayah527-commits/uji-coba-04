<!DOCTYPE html>  
<html lang="id">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Profil Siswa Modern</title>  
  
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">  
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">  
  
<style>  
*{  
    margin:0;  
    padding:0;  
    box-sizing:border-box;  
    font-family:'Poppins', sans-serif;  
}  
  
body{  
    min-height:100vh;  
    display:flex;  
    justify-content:center;  
    align-items:center;  
    background: radial-gradient(circle at top,  
        #2b1055,  
        #4b0082,  
        #1a002b);  
}  
  
.container{  
    width:350px;  
    background:#ffffff10;  
    border-radius:20px;  
    overflow:hidden;  
    position:relative;  
    border:1px solid rgba(255,255,255,0.25);  
    box-shadow:  
        0 0 10px rgba(138,43,226,0.6),  
        0 0 25px rgba(199,125,255,0.4),  
        0 0 45px rgba(138,43,226,0.25);  
    backdrop-filter:blur(10px);  
}  
  
.container::after{  
    content:"";  
    position:absolute;  
    inset:0;  
    border-radius:20px;  
    padding:2px;  
    background:linear-gradient(45deg,#8a2be2,#c77dff,#ffffff,#8a2be2);  
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);  
    -webkit-mask-composite:xor;  
    mask-composite:exclude;  
    animation:glowBorder 4s linear infinite;  
    opacity:0.8;  
}  
  
@keyframes glowBorder{  
    0%{ filter:hue-rotate(0deg);}  
    100%{ filter:hue-rotate(360deg);}  
}  
  
.banner{  
    height:130px;  
    background:linear-gradient(45deg,#8a2be2,#c77dff);  
    display:flex;  
    justify-content:center;  
    align-items:flex-start;  
    padding-top:25px;  
    color:white;  
    font-weight:bold;  
    letter-spacing:3px;  
    font-size:22px; /* 🔥 DIPERBESAR */  
    text-shadow:0 0 10px rgba(255,255,255,0.8),  
                0 0 20px rgba(199,125,255,0.6);  
}  
  
.profile{  
    display:flex;  
    justify-content:center;  
    margin-top:-55px;  
}  
  
.profile img{  
    width:100px;  
    height:100px;  
    border-radius:50%;  
    border:4px solid white;  
    object-fit:cover;  
    box-shadow:0 0 15px rgba(255,255,255,0.4);  
}  
  
.content{  
    padding:20px;  
    text-align:center;  
    color:white;  
}  
  
.content h2{  
    margin-top:10px;  
    font-size:18px; /* 🔥 DIPERKECIL */  
}  
  
.content p{  
    font-size:13px;  
    opacity:0.9;  
    margin-top:5px;  
}  
  
.info{  
    margin-top:15px;  
    text-align:left;  
    font-size:13px;  
    line-height:1.6;  
}  
  
.info b{  
    color:#d9b3ff;  
}  
  
.motivasi{  
    margin-top:12px;  
    font-size:12px;  
    font-style:italic;  
    color:#e6ccff;  
    text-align:center;  
}  
  
.social{  
    margin-top:15px;  
    text-align:center;  
}  
  
.social a{  
    color:white;  
    margin:0 8px;  
    font-size:20px;  
    transition:0.3s;  
}  
  
.social a:hover{  
    color:#c77dff;  
    transform:scale(1.2);  
}  
</style>  
  
</head>  
  
<body>  
  
<div class="container">  
  
    <div class="banner">  
        PROFILE DIRI SISWA  
    </div>  
  
    <div class="profile">  
        <img src="foto.jpg" alt="Foto Profil">  
    </div>  
  
    <div class="content">  
        <h2>Inayah Putri Mayu</h2>  
        <p>Kreatif • Modern • Informatika</p>  
  
        <div class="info">  
            <p><b>Kelas:</b> X-A Farmasi </p>  
            <p><b>Sekolah:</b> SMKS Kesehatan Yannas Husada Bangkalan</p>  
            <p><b>Hobi:</b> Berkebun & Memasak</p>  
        </div>  
  
        <div class="motivasi">  
            "Usaha tidak akan menghianati hasil"  
        </div>  
  
        <div class="social">  
            <a href="#"><i class="fab fa-instagram"></i></a>  
            <a href="#"><i class="fab fa-tiktok"></i></a>  
            <a href="#"><i class="fab fa-whatsapp"></i></a>  
            <a href="#"><i class="fab fa-github"></i></a>  
        </div>  
  
    </div>  
  
</div>  
  
</body>  
</html>
